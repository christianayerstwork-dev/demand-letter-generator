<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for the icon -->
  <circle cx="50" cy="60" r="40" fill="#2563eb" opacity="0.1"/>

  <!-- Scales of Justice icon -->
  <g transform="translate(30, 35)">
    <!-- Left scale pan -->
    <line x1="15" y1="25" x2="25" y2="30" stroke="#2563eb" stroke-width="2"/>
    <rect x="10" y="30" width="15" height="2" fill="#2563eb" rx="1"/>

    <!-- Right scale pan -->
    <line x1="25" y1="25" x2="35" y2="30" stroke="#2563eb" stroke-width="2"/>
    <rect x="30" y="30" width="15" height="2" fill="#2563eb" rx="1"/>

    <!-- Center pole -->
    <line x1="25" y1="10" x2="25" y2="40" stroke="#2563eb" stroke-width="2.5"/>

    <!-- Top of scales -->
    <line x1="15" y1="25" x2="35" y2="25" stroke="#2563eb" stroke-width="2"/>

    <!-- Base -->
    <rect x="15" y="40" width="20" height="3" fill="#2563eb" rx="1.5"/>
  </g>

  <!-- Checkmark element -->
  <g transform="translate(28, 70)">
    <circle cx="12" cy="12" r="12" fill="#10b981" opacity="0.9"/>
    <path d="M 6 12 L 10 16 L 18 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company name -->
  <text x="100" y="50" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#1e3a8a">
    SMART SETTLE
  </text>
  <text x="100" y="78" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#2563eb">
    GO
  </text>

  <!-- Tagline -->
  <text x="100" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">
    Professional Debt Recovery Services
  </text>

  <!-- Decorative underline -->
  <rect x="100" y="82" width="200" height="2" fill="#2563eb" opacity="0.3" rx="1"/>
</svg>
